name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  check:
    name: Format, Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format:check

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck
